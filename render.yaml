services:
  # Main Rust application (public web service)
  - type: web
    name: used-kinds-rs
    runtime: docker
    repo: https://github.com/dcadenas/used-kinds-rs
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: QDRANT_URL
        fromService:
          type: pserv
          name: qdrant
          property: hostport  # Resolves to qdrant:6334
      - key: STATS_FILE
        value: /var/data/stats.json
      - key: RUST_LOG
        value: info
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 2
    healthCheckPath: /health
    autoDeploy: true  # Deploy on every push to main

  # Qdrant vector database (private service - internal only)
  - type: pserv
    name: qdrant
    runtime: image
    image:
      url: docker.io/qdrant/qdrant:latest
    envVars:
      - key: QDRANT__SERVICE__HTTP_PORT
        value: 6333
      - key: QDRANT__SERVICE__GRPC_PORT
        value: 6334
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 10
