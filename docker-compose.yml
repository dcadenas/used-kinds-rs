version: '3.8'

services:
  qdrant:
    # Same version the production image bakes in (see Dockerfile) so dev
    # storage stays format-compatible.
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  used-kinds-rs:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - QDRANT_URL=http://qdrant:6334
      - STATS_FILE=/var/data/stats.json
    volumes:
      - ./data:/var/data
    depends_on:
      - qdrant
